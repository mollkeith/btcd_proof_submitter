<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proof Submitter</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/icons.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="ambient" aria-hidden="true">
      <div class="ambient-orb ambient-orb-gold"></div>
      <div class="ambient-orb ambient-orb-blue"></div>
      <div class="ambient-orb ambient-orb-violet"></div>
      <div class="ambient-grid"></div>
    </div>

    <div class="shell">
    <svg xmlns="http://www.w3.org/2000/svg" aria-hidden="true" hidden class="svg-sprite">
      <symbol id="icon-btc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M9.5 8.5c.6-.15 1.1 0 1.3.45.2.45 0 .95-.65 1.2l.75 2.9c.85-.2 1.55-.05 2 .45.55.55.65 1.4-.05 2.15-.75.8-1.85 1.15-3.05.95l-.35 1.35h-1.15l.35-1.35c-.3-.05-.55-.15-.85-.3l-.35 1.35H6.5l1.55-6.05c.75-.2 1.4-.5 1.9-.85l-.7-2.75zm-.85 4.35l.55 2.2c.55.15 1 .05 1.3-.15.35-.3.35-.75 0-1.05-.3-.35-.8-.5-1.45-.4l-.4-1.6zm-1.55-2.35l.5 2c.5.05.85 0 1.05-.25.3-.25.3-.6 0-.85-.25-.3-.65-.45-1.15-.4l-.4-1.5z" fill="currentColor" stroke="none"/>
      </symbol>
      <symbol id="icon-wallet" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 7V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/>
        <path d="M3 7h18v4H3z"/>
        <circle cx="16.5" cy="13" r="1" fill="currentColor" stroke="none"/>
      </symbol>
      <symbol id="icon-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/>
      </symbol>
      <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </symbol>
      <symbol id="icon-form" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" rx="3"/>
        <path d="M8 9h8M8 13h5"/>
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/>
        <path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </symbol>
      <symbol id="icon-link" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </symbol>
      <symbol id="icon-server" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="6" rx="2"/>
        <rect x="3" y="14" width="18" height="6" rx="2"/>
        <circle cx="7" cy="7" r="1" fill="currentColor" stroke="none"/>
        <circle cx="7" cy="17" r="1" fill="currentColor" stroke="none"/>
      </symbol>
      <symbol id="icon-hash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9h16M4 15h16M10 4L8 20M16 4l-2 16"/>
      </symbol>
      <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </symbol>
      <symbol id="icon-file" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <path d="M14 2v6h6"/>
      </symbol>
      <symbol id="icon-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 10v6M12 7h.01"/>
      </symbol>
      <symbol id="icon-translate" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2v3"/>
        <path d="M22 22l-5-10-5 10M14 18h6"/>
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </symbol>
      <symbol id="icon-contract" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
        <path d="M16 3h2a2 2 0 0 1 2 2v2M8 3v4h8V3"/>
        <path d="M9 13h6M9 17h4"/>
      </symbol>
    </svg>

    <div class="page">
      <section class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg class="brand-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="32" height="32" rx="10" fill="url(#brandGrad)"/>
              <path d="M18.2 8.4c.9-.2 1.6.1 1.9.8.3.7 0 1.5-.8 1.9l1.1 4.3c1.2-.3 2.2-.1 2.9.6.8.8.9 2-.1 3.1-1 1.1-2.5 1.6-4.2 1.3l-.5 2h-1.6l.5-2c-.4-.1-.8-.2-1.2-.4l-.5 2H13l2.2-8.6c1.1-.3 2-.7 2.7-1.2l-1-3.9zm-1.2 5.8l.8 3.1c.8.2 1.4.1 1.8-.2.5-.4.5-1 0-1.5-.4-.5-1.1-.7-2-.6l-.6-2.8zm-2.1-3.3l.7 2.8c.7.1 1.2 0 1.5-.3.4-.3.4-.8 0-1.2-.3-.4-.9-.6-1.6-.5l-.6-2.8z" fill="#fff"/>
              <circle cx="24" cy="24" r="5" fill="#22c55e" stroke="#07111f" stroke-width="1.5"/>
              <path d="M22.2 24l1.3 1.3 2.5-2.6" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <defs>
                <linearGradient id="brandGrad" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#3b82f6"/>
                  <stop offset="1" stop-color="#f7931a"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="brand-copy">
            <div id="brand-title" class="brand-title">BTC Proof Submitter</div>
            <div id="brand-subtitle" class="brand-subtitle">Static utility for pledge and unlock proof submission</div>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="topbar-note" class="topbar-note">
            <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-wallet"/></svg>
            EVM Wallet
          </div>
          <button type="button" id="language-toggle-button" class="btn-secondary lang-toggle-btn icon-btn">
            <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-translate"/></svg>
            EN
          </button>
          <button type="button" id="wallet-connect-button" class="wallet-connect-btn icon-btn">
            <svg class="icon icon-sm wallet-connect-icon" aria-hidden="true"><use href="#icon-wallet"/></svg>
            Connect
          </button>
        </div>
      </section>

      <div class="dashboard-grid">
        <section class="card card-main">
          <div class="card-glow card-glow-main" aria-hidden="true"></div>
          <div class="section-head section-head-hero">
            <div class="section-head-main">
              <div class="section-head-icon section-head-icon-primary">
                <svg class="icon icon-xl" aria-hidden="true"><use href="#icon-send"/></svg>
              </div>
              <div class="section-head-copy">
                <p class="section-eyebrow" id="submit-eyebrow">On-chain Proof Console</p>
                <h2 id="submit-heading">提交证明</h2>
              </div>
            </div>
            <div id="submit-tag" class="section-tag">
              <span class="live-dot" aria-hidden="true"></span>
              Live
            </div>
          </div>

          <form id="submit-form" class="stack">
            <div class="form-sections">
              <div class="subcard subcard-config">
                <div class="subcard-head">
                  <div class="subcard-icon"><svg class="icon" aria-hidden="true"><use href="#icon-settings"/></svg></div>
                  <div id="config-title" class="subcard-title">环境配置</div>
                </div>
                <div class="field-row">
                  <div class="field">
                    <label id="network-label" for="network" class="field-label">
                      <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-globe"/></svg>
                      网络
                    </label>
                    <select id="network" name="network">
                      <option value="staging">staging</option>
                      <option value="pg">pg</option>
                    </select>
                  </div>

                  <div class="field">
                    <label id="proof-type-label" for="proof-type" class="field-label">
                      <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-file"/></svg>
                      证明类型
                    </label>
                    <select id="proof-type" name="proof-type">
                      <option id="proof-type-pledge" value="pledge">提交质押证明</option>
                      <option id="proof-type-unlock" value="unlock">提交解锁证明</option>
                      <option id="proof-type-renewal" value="renewal">提交延期证明</option>
                      <option id="proof-type-renewal-topup" value="renewal-topup">提交延期补仓证明</option>
                      <option id="proof-type-repayment" value="repayment">确认余额还款</option>
                      <option id="proof-type-timeout-repay" value="timeout-repay">开启超时帮还</option>
                      <option id="proof-type-execute-increase" value="execute-increase">同意增贷</option>
                      <option id="proof-type-cancel-increase" value="cancel-increase">取消增贷</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="subcard subcard-params">
                <div class="subcard-head">
                  <div class="subcard-icon"><svg class="icon" aria-hidden="true"><use href="#icon-form"/></svg></div>
                  <div id="params-title" class="subcard-title">业务参数</div>
                </div>
                <div class="field">
                  <label id="order-address-label" for="order-address" class="field-label">
                    <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-contract"/></svg>
                    Order ID / 订单合约地址
                  </label>
                  <input
                    id="order-address"
                    name="order-address"
                    type="text"
                    placeholder="0x..."
                    autocomplete="off"
                  />
                </div>

                <div class="field" id="timeout-repay-row" hidden>
                  <label id="timeout-repay-enabled-label" for="timeout-repay-enabled" class="field-label">帮还开关</label>
                  <select id="timeout-repay-enabled" name="timeout-repay-enabled">
                    <option value="true" id="timeout-repay-enabled-on">开启（允许他人帮还）</option>
                    <option value="false" id="timeout-repay-enabled-off">关闭</option>
                  </select>
                </div>

                <div class="field" id="borrower-btc-row" hidden>
                  <label id="borrower-btc-label" for="borrower-btc-address" class="field-label">
                    <svg class="icon icon-sm icon-btc" aria-hidden="true"><use href="#icon-btc"/></svg>
                    借款人 BTC 地址
                  </label>
                  <input
                    id="borrower-btc-address"
                    name="borrower-btc-address"
                    type="text"
                    placeholder="bc1..."
                    autocomplete="off"
                  />
                </div>

                <div class="field-row" id="btc-txid-row">
                  <div class="field">
                    <label id="btc-txid-label" for="btc-txid" class="field-label">
                      <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-hash"/></svg>
                      BTC 交易哈希
                    </label>
                    <input
                      id="btc-txid"
                      name="btc-txid"
                      type="text"
                      placeholder="例如：b0239a30d8344387..."
                      autocomplete="off"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="actions">
              <button type="submit" id="submit-proof" class="btn-primary icon-btn">
                <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-send"/></svg>
                生成 proof 并提交
              </button>
            </div>
          </form>

          <div class="footer-note" id="form-footer-note">
            <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-info"/></svg>
            <span>BTC 确认数需至少 <strong>3</strong>。</span>
          </div>
        </section>

        <aside class="sidebar-panel">
          <div class="sidebar-label" id="sidebar-label">Mission Control</div>
          <div class="stack sidebar-stack">
          <section class="card compact-card sidebar-card-network card-accent-blue">
            <div class="section-head section-head-compact">
              <div class="section-head-main">
                <div class="section-head-icon section-head-icon-blue">
                  <svg class="icon" aria-hidden="true"><use href="#icon-globe"/></svg>
                </div>
                <h2 id="network-card-title">当前网络</h2>
              </div>
            </div>
            <div class="pill-grid compact">
              <div class="pill compact">
                <div class="pill-head">
                  <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-server"/></svg>
                  <div class="title">RPC</div>
                </div>
                <div id="network-rpc" class="value mono"></div>
              </div>
              <div class="pill compact">
                <div class="pill-head">
                  <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-hash"/></svg>
                  <div class="title">Chain ID</div>
                </div>
                <div id="network-chain-id" class="value mono"></div>
              </div>
              <div class="pill compact">
                <div class="pill-head">
                  <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-contract"/></svg>
                  <div id="issuer-title" class="title">Issuer 合约</div>
                </div>
                <div id="network-issuer" class="value mono"></div>
              </div>
              <div class="pill compact">
                <div class="pill-head">
                  <svg class="icon icon-sm icon-muted" aria-hidden="true"><use href="#icon-link"/></svg>
                  <div id="explorer-title" class="title">浏览器</div>
                </div>
                <div id="network-explorer" class="value"></div>
              </div>
            </div>
          </section>

          <section class="card compact-card sidebar-card-wallet card-accent-green">
            <div class="section-head section-head-compact">
              <div class="section-head-main">
                <div class="section-head-icon section-head-icon-green">
                  <svg class="icon" aria-hidden="true"><use href="#icon-wallet"/></svg>
                </div>
                <h2 id="wallet-card-title">钱包状态</h2>
              </div>
            </div>
            <div id="wallet-status" class="status-box compact warning">
              尚未连接钱包。
            </div>
          </section>

          <section class="card sidebar-card-status card-accent-amber">
            <div class="section-head section-head-compact">
              <div class="section-head-main">
                <div class="section-head-icon section-head-icon-amber">
                  <svg class="icon" aria-hidden="true"><use href="#icon-activity"/></svg>
                </div>
                <h2 id="action-card-title">执行状态</h2>
              </div>
            </div>
            <div id="action-status" class="status-box">
              等待输入参数。
            </div>
          </section>

          <section class="card sidebar-card-result card-accent-purple">
            <div class="section-head section-head-compact">
              <div class="section-head-main">
                <div class="section-head-icon section-head-icon-purple">
                  <svg class="icon" aria-hidden="true"><use href="#icon-file"/></svg>
                </div>
                <h2 id="result-card-title">本次结果</h2>
              </div>
            </div>
            <div id="result-box" class="result-box">
              还没有生成 proof。
            </div>
          </section>
          </div>
        </aside>
      </div>

      <div id="wallet-modal" class="wallet-modal" hidden>
        <div class="wallet-modal-card">
          <div class="wallet-modal-head">
            <div class="wallet-modal-title-wrap">
              <div class="section-head-icon section-head-icon-green">
                <svg class="icon" aria-hidden="true"><use href="#icon-wallet"/></svg>
              </div>
              <div id="wallet-modal-title" class="wallet-modal-title">选择钱包</div>
            </div>
            <button type="button" id="wallet-modal-close" class="btn-secondary icon-btn">
              <svg class="icon icon-sm" aria-hidden="true"><use href="#icon-x"/></svg>
              关闭
            </button>
          </div>
          <div id="wallet-list" class="wallet-list"></div>
        </div>
      </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
