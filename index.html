<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proof Submitter</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --bg-secondary: #0b1629;
        --panel: rgba(9, 18, 33, 0.86);
        --panel-strong: rgba(10, 20, 38, 0.96);
        --panel-soft: rgba(15, 23, 42, 0.6);
        --panel-border: rgba(148, 163, 184, 0.14);
        --line: rgba(148, 163, 184, 0.1);
        --text: #e5eefb;
        --muted: #9db0cd;
        --subtle: #c7d4ea;
        --primary: #4f8cff;
        --primary-hover: #3777f6;
        --primary-soft: rgba(79, 140, 255, 0.14);
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --input: rgba(7, 14, 27, 0.92);
        --shadow: 0 28px 80px rgba(2, 8, 23, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(79, 140, 255, 0.22), transparent 28%),
          radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 24%),
          linear-gradient(180deg, #09111f 0%, #07111f 38%, #091523 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 48px 48px;
        mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 75%);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      a {
        color: #9bc4ff;
      }

      .page {
        width: min(1180px, calc(100% - 36px));
        margin: 24px auto 40px;
      }

      .topbar,
      .hero,
      .card,
      .info-strip {
        position: relative;
        overflow: hidden;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .topbar,
      .hero,
      .card {
        border-radius: 24px;
      }

      .topbar::after,
      .hero::after,
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.06),
          transparent 28%,
          transparent 72%,
          rgba(79, 140, 255, 0.08)
        );
      }

      .topbar {
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        flex: 1 1 auto;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: white;
        background: linear-gradient(135deg, #3b82f6, #22c55e);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }

      .brand-copy {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .brand-title {
        font-size: 15px;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .brand-subtitle {
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }

      .topbar-note {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: var(--subtle);
        font-size: 13px;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .lang-toggle-btn {
        min-width: 74px;
        min-height: 44px;
        padding-inline: 14px;
        border-radius: 999px;
        font-weight: 700;
      }

      .wallet-connect-btn {
        min-width: 116px;
        min-height: 44px;
        padding: 10px 16px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--primary), #2967e8);
        color: #fff;
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(59, 130, 246, 0.24);
      }

      .wallet-connect-btn.connected {
        background: rgba(34, 197, 94, 0.14);
        color: #c8f7d8;
        border: 1px solid rgba(34, 197, 94, 0.25);
        box-shadow: none;
      }

      .hero {
        padding: 34px;
        margin-bottom: 18px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr);
        gap: 28px;
        align-items: start;
      }

      h1 {
        font-size: clamp(34px, 5vw, 52px);
        line-height: 1.04;
        letter-spacing: -0.03em;
      }

      .hero-copy p {
        margin-top: 16px;
        max-width: 760px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.75;
      }

      .hero-meta {
        display: grid;
        gap: 12px;
      }

      .hero-stat {
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(7, 14, 27, 0.5);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .hero-stat .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .hero-stat .value {
        margin-top: 8px;
        font-size: 15px;
        line-height: 1.6;
      }

      .info-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 20px;
        background: transparent;
        border: 0;
        box-shadow: none;
        backdrop-filter: none;
      }

      .info-item {
        padding: 16px 18px;
        border-radius: 18px;
        background: rgba(9, 18, 33, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.12);
        box-shadow: 0 12px 40px rgba(2, 8, 23, 0.22);
      }

      .info-item strong {
        display: block;
        font-size: 13px;
        color: var(--subtle);
        margin-bottom: 8px;
      }

      .info-item span {
        color: var(--muted);
        line-height: 1.6;
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1.18fr) minmax(330px, 0.82fr);
        gap: 20px;
        align-items: start;
      }

      .card {
        padding: 24px;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .section-head h2 {
        font-size: 24px;
        line-height: 1.15;
      }

      .section-head p {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
        margin-top: 8px;
      }

      .section-tag {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.18);
        color: #bdf5cf;
        font-size: 12px;
        font-weight: 700;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .sidebar-stack {
        gap: 12px;
      }

      .form-sections {
        display: grid;
        gap: 18px;
      }

      .subcard {
        position: relative;
        padding: 18px;
        border-radius: 20px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        background: rgba(8, 15, 28, 0.52);
      }

      .subcard-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--subtle);
        margin-bottom: 6px;
      }

      .subcard-desc {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .input-with-suffix {
        position: relative;
      }

      .input-with-suffix input {
        padding-right: 72px;
      }

      .input-suffix {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.1);
        border: 1px solid rgba(148, 163, 184, 0.12);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        pointer-events: none;
      }

      label {
        font-size: 13px;
        font-weight: 700;
        color: #d7e3f7;
      }

      .hint {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(9, 17, 31, 0.96), rgba(6, 12, 24, 0.96));
        color: var(--text);
        padding: 14px 16px;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }

      input::placeholder,
      textarea::placeholder {
        color: #7083a1;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(79, 140, 255, 0.8);
        box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.12);
        transform: translateY(-1px);
      }

      select {
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #8ea7cc 50%),
          linear-gradient(135deg, #8ea7cc 50%, transparent 50%);
        background-position:
          calc(100% - 22px) calc(50% - 1px),
          calc(100% - 16px) calc(50% - 1px);
        background-size: 6px 6px, 6px 6px;
        background-repeat: no-repeat;
        padding-right: 40px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 14px 18px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease,
          background 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), #2967e8);
        color: white;
        font-weight: 700;
        box-shadow: 0 14px 30px rgba(59, 130, 246, 0.24);
      }

      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, var(--primary-hover), #225ede);
      }

      .btn-secondary {
        background: rgba(148, 163, 184, 0.08);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.16);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .pill-grid {
        display: grid;
        gap: 12px;
      }

      .pill-grid.compact {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .pill {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        background: rgba(7, 14, 27, 0.5);
      }

      .pill .title {
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .pill .value {
        margin-top: 8px;
        font-size: 15px;
        line-height: 1.55;
        word-break: break-all;
      }

      .pill.compact {
        padding: 12px 14px;
        border-radius: 14px;
      }

      .pill.compact .title {
        font-size: 11px;
      }

      .pill.compact .value {
        margin-top: 6px;
        font-size: 13px;
        line-height: 1.4;
      }

      .status-box,
      .result-box {
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        background: rgba(7, 14, 27, 0.56);
        line-height: 1.7;
      }

      .status-box.compact {
        padding: 12px 14px;
        border-radius: 14px;
        line-height: 1.45;
        font-size: 13px;
      }

      .status-box.success {
        border-color: rgba(34, 197, 94, 0.32);
        background: rgba(34, 197, 94, 0.11);
      }

      .status-box.warning {
        border-color: rgba(245, 158, 11, 0.3);
        background: rgba(245, 158, 11, 0.11);
      }

      .status-box.error {
        border-color: rgba(239, 68, 68, 0.3);
        background: rgba(239, 68, 68, 0.11);
      }

      .mono {
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        word-break: break-all;
      }

      .result-list {
        display: grid;
        gap: 10px;
      }

      .result-item {
        display: grid;
        gap: 4px;
      }

      .result-item .key {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }

      .small {
        font-size: 12px;
      }

      .footer-note {
        margin-top: 2px;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px dashed rgba(148, 163, 184, 0.18);
        background: rgba(255, 255, 255, 0.02);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      [hidden] {
        display: none !important;
      }

      .result-box {
        max-height: 260px;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .compact-card {
        padding: 18px;
      }

      .compact-card .section-head {
        margin-bottom: 12px;
      }

      .compact-card .section-head h2 {
        font-size: 18px;
      }

      .wallet-modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 16px;
        background: rgba(2, 8, 23, 0.62);
        backdrop-filter: blur(8px);
      }

      .wallet-modal-card {
        width: min(460px, 100%);
        max-height: min(80vh, 640px);
        overflow: auto;
        padding: 22px;
        border-radius: 24px;
        background: var(--panel-strong);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: var(--shadow);
      }

      .wallet-modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .wallet-modal-title {
        font-size: 18px;
        font-weight: 700;
      }

      .wallet-list {
        display: grid;
        gap: 10px;
      }

      .wallet-item {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.14);
        background: rgba(7, 14, 27, 0.72);
        color: var(--text);
        text-align: left;
      }

      .wallet-item-main {
        display: grid;
        gap: 4px;
      }

      .wallet-item-name {
        font-weight: 700;
      }

      .wallet-item-sub {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .hero-grid,
        .grid,
        .info-strip {
          grid-template-columns: 1fr;
        }

        .sidebar-stack {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 16px;
        }

        .pill-grid.compact {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .topbar {
          flex-direction: column;
          align-items: stretch;
        }

        .topbar-actions {
          width: 100%;
          justify-content: space-between;
        }

        .section-head {
          flex-direction: column;
        }
      }

      @media (max-width: 640px) {
        .page {
          width: min(100%, calc(100% - 18px));
          margin: 12px auto 24px;
        }

        .topbar,
        .hero,
        .card {
          border-radius: 20px;
        }

        .topbar,
        .hero,
        .card {
          padding: 18px;
        }

        .brand {
          align-items: flex-start;
        }

        .brand-mark {
          width: 38px;
          height: 38px;
          border-radius: 12px;
          flex: 0 0 auto;
        }

        .brand-title {
          font-size: 14px;
        }

        .brand-subtitle {
          display: none;
        }

        .topbar-note {
          display: none;
        }

        .topbar-actions {
          gap: 8px;
        }

        .wallet-connect-btn {
          width: 100%;
          min-width: 0;
        }

        .field-row {
          grid-template-columns: 1fr;
        }

        input,
        select,
        textarea,
        button {
          font-size: 16px;
        }

        .pill-grid.compact {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: column;
        }

        .actions button {
          width: 100%;
        }

        .sidebar-stack {
          grid-template-columns: 1fr;
        }

        .sidebar-card-status {
          order: 1;
        }

        .sidebar-card-result {
          order: 2;
        }

        .sidebar-card-network {
          order: 3;
        }

        .sidebar-card-wallet {
          order: 4;
        }

        .wallet-modal {
          align-items: end;
          padding: 10px;
        }

        .wallet-modal-card {
          width: 100%;
          padding: 18px;
          border-radius: 20px;
        }

        .wallet-modal-head {
          align-items: flex-start;
        }

        .wallet-item {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="topbar">
        <div class="brand">
          <div class="brand-mark">BT</div>
          <div class="brand-copy">
            <div id="brand-title" class="brand-title">BTC Proof Submitter</div>
            <div id="brand-subtitle" class="brand-subtitle">Static utility for pledge and unlock proof submission</div>
          </div>
        </div>
        <div class="topbar-actions">
          <div id="topbar-note" class="topbar-note">EVM Wallet</div>
          <button type="button" id="language-toggle-button" class="btn-secondary lang-toggle-btn">EN</button>
          <button type="button" id="wallet-connect-button" class="wallet-connect-btn">Connect</button>
        </div>
      </section>

      <div class="grid">
        <section class="card">
          <div class="section-head">
            <div>
              <h2 id="submit-heading">提交证明</h2>
            </div>
            <div id="submit-tag" class="section-tag">Live</div>
          </div>

          <form id="submit-form" class="stack">
            <div class="form-sections">
              <div class="subcard">
                <div id="config-title" class="subcard-title">环境配置</div>
                <div class="field-row">
                  <div class="field">
                    <label id="network-label" for="network">网络</label>
                    <select id="network" name="network">
                      <option value="staging">staging</option>
                      <option value="pg">pg</option>
                    </select>
                  </div>

                  <div class="field">
                    <label id="proof-type-label" for="proof-type">证明类型</label>
                    <select id="proof-type" name="proof-type">
                      <option id="proof-type-pledge" value="pledge">提交质押证明</option>
                      <option id="proof-type-unlock" value="unlock">提交解锁证明</option>
                      <option id="proof-type-renewal" value="renewal">提交延期证明</option>
                      <option id="proof-type-renewal-topup" value="renewal-topup">提交延期补仓证明</option>
                      <option id="proof-type-repayment" value="repayment">确认余额还款</option>
                      <option id="proof-type-timeout-repay" value="timeout-repay">开启超时帮还</option>
                      <option id="proof-type-execute-increase" value="execute-increase">同意增贷</option>
                      <option id="proof-type-cancel-increase" value="cancel-increase">取消增贷</option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="subcard">
                <div id="params-title" class="subcard-title">业务参数</div>
                <div class="field">
                  <label id="order-address-label" for="order-address">Order ID / 订单合约地址</label>
                  <input
                    id="order-address"
                    name="order-address"
                    type="text"
                    placeholder="0x..."
                    autocomplete="off"
                  />
                </div>

                <div class="field" id="timeout-repay-row" hidden>
                  <label id="timeout-repay-enabled-label" for="timeout-repay-enabled">帮还开关</label>
                  <select id="timeout-repay-enabled" name="timeout-repay-enabled">
                    <option value="true" id="timeout-repay-enabled-on">开启（允许他人帮还）</option>
                    <option value="false" id="timeout-repay-enabled-off">关闭</option>
                  </select>
                </div>

                <div class="field" id="borrower-btc-row" hidden>
                  <label id="borrower-btc-label" for="borrower-btc-address">借款人 BTC 地址</label>
                  <input
                    id="borrower-btc-address"
                    name="borrower-btc-address"
                    type="text"
                    placeholder="bc1..."
                    autocomplete="off"
                  />
                </div>

                <div class="field-row" id="btc-txid-row">
                  <div class="field">

        return value.replace(/\{(\w+)\}/g, (_, name) => String(vars[name] ?? ""));

      function extractErrorMessage(error, fallback = t("errors.unknown")) {
        if (!error) {
          return fallback;
        }

        const candidates = [
          error.shortMessage,
          error.reason,
          error.message,
          error.info?.error?.message,
          error.info?.payload?.error?.message,
          error.error?.message,
          error.data?.message,
          error.cause?.message,
        ].filter(Boolean);

        for (const candidate of candidates) {
          if (typeof candidate !== "string") continue;
          const trimmed = candidate.trim();
          if (!trimmed) continue;

          if (trimmed.includes("could not coalesce error")) {
            continue;
          }

          return trimmed;
        }

        for (const candidate of candidates) {
          if (typeof candidate === "string" && candidate.trim()) {
            return candidate.trim();
          }
        }

        return fallback;
      }

      async function connectWallet() {
        const providerObject = getWalletProvider();
        if (!providerObject) {
          throw new Error(t("errors.noWallet"));

        state.provider = new ethers.BrowserProvider(providerObject);
        await state.provider.send("eth_requestAccounts", []);
        state.signer = await state.provider.getSigner();
        state.account = await state.signer.getAddress();
        state.chainIdHex = await providerObject.request({ method: "eth_chainId" });
        const matchedWallet = state.discoveredWallets.find((wallet) => wallet.provider === providerObject);
        state.walletLabel = matchedWallet?.info?.name || t("wallet.defaultName");
        setWalletStatus(
          t("wallet.connected", {
            wallet: escapeHtml(state.walletLabel),
            account: escapeHtml(state.account),
            chainId: escapeHtml(state.chainIdHex),
          }),
          "success"
        );
        setWalletButton();

      async function ensureSelectedNetwork() {
        const network = getSelectedNetwork();
        const providerObject = getWalletProvider();

        if (!providerObject) {
          throw new Error(t("errors.noWallet"));
        }

        let currentChainId = await providerObject.request({ method: "eth_chainId" });
        if (currentChainId.toLowerCase() === network.chainIdHex.toLowerCase()) {
          state.chainIdHex = currentChainId;
          return;
        }

        try {
          await providerObject.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: network.chainIdHex }],
          });
        } catch (error) {
          if (error && error.code === 4902) {
            await providerObject.request({
              method: "wallet_addEthereumChain",
              params: [
                {
                  chainId: network.chainIdHex,
                  chainName: network.chainName,
                  rpcUrls: [network.rpcUrl],
                  nativeCurrency: network.nativeCurrency,
                  blockExplorerUrls: [network.explorer],
                },
              ],
            });
            await providerObject.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: network.chainIdHex }],
            });
          } else {
            throw error;
          }
        }

        state.chainIdHex = await providerObject.request({ method: "eth_chainId" });
      }

      async function btcRpc(method, params) {
        const response = await fetch(BTC_APIS.rpc, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            jsonrpc: "1.0",
            id: Date.now(),
            method,
            params,
          }),
        });

        if (!response.ok) {
          throw new Error(t("errors.btcRpcHttp", { status: response.status }));
        }

        const payload = await response.json();
        if (payload.error) {
          throw new Error(payload.error.message || t("errors.btcRpcError"));
        }

        return payload.result;
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(t("errors.requestFailed", { url, status: response.status }));
        }
        return response.json();
      }

      async function fetchText(url) {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(t("errors.requestFailed", { url, status: response.status }));
        }
        return response.text();
      }

      async function fetchBtcTransaction(txid) {
        try {
          const tx = await btcRpc("getrawtransaction", [txid, true]);
          return {
            txid: tx.txid,
            hex: tx.hex,
            blockHash: tx.blockhash,
            blockHeight: tx.blockheight,
            confirmations: tx.confirmations || 0,
          };
        } catch (primaryError) {
          const txInfo = await fetchJson(`${BTC_APIS.fallback}/tx/${txid}`);
          const txHex = await fetchText(`${BTC_APIS.fallback}/tx/${txid}/hex`);
          const blockHeight = txInfo.status?.block_height || null;
          let confirmations = 0;
          if (blockHeight) {
            const bestHeightText = await fetchText(`${BTC_APIS.fallback}/blocks/tip/height`);
            const bestHeight = Number(bestHeightText);
            confirmations = bestHeight - blockHeight + 1;
          }
          return {
            txid: txid,
            hex: txHex.trim(),
            blockHash: txInfo.status?.block_hash || null,
            blockHeight,
            confirmations,
            primaryError,
          };
        }
      }

      async function fetchBlockData(blockHash) {
        try {
          const firstPage = await fetchJson(`${BTC_APIS.explorer}/block/${blockHash}`);
          const txIds = Array.isArray(firstPage.txs) ? firstPage.txs.map((item) => item.txid) : [];

          for (let page = 2; page <= Number(firstPage.totalPages || 0); page += 1) {
            const pageData = await fetchJson(`${BTC_APIS.explorer}/block/${blockHash}?page=${page}`);
            if (Array.isArray(pageData.txs)) {
              txIds.push(...pageData.txs.map((item) => item.txid));
            }
          }

          return {
            height: Number(firstPage.height),
            txIds,
          };
        } catch (primaryError) {
          const blockInfo = await fetchJson(`${BTC_APIS.fallback}/block/${blockHash}`);
          const txIds = await fetchJson(`${BTC_APIS.fallback}/block/${blockHash}/txids`);
          return {
            height: Number(blockInfo.height),
            txIds,
            primaryError,
          };
        }
      }

      function normalizeTxid(txid) {
        return txid.trim().replace(/^0x/i, "").toLowerCase();

            btcTxid: null,
            borrowerBtcAddress: null,
            timeoutRepayEnabled: elements.timeoutRepayEnabled.value === "true",
          };

          borrowerBtcAddress: null,
          timeoutRepayEnabled: null,
        };
      }

      function buildEmptyRenewalProof() {
        const rawData = "0x";
        const blockHeight = 0;
        const merkleProof = {
          proof: [],
          root: ethers.ZeroHash,
          leaf: ethers.ZeroHash,
          flags: [],
        };

        return {
          txRawData: rawData,
          blockHeight,
          confirmations: null,
          txIndex: null,
          merkleProof,
        };
      }

      function hexToBytes(hex) {
        const clean = hex.replace(/^0x/i, "").toLowerCase();
        if (clean.length % 2 !== 0) {
          throw new Error(t("errors.invalidHexLength", { hex }));
        }

        const bytes = new Uint8Array(clean.length / 2);
        for (let i = 0; i < clean.length; i += 2) {
          bytes[i / 2] = Number.parseInt(clean.slice(i, i + 2), 16);
        }
        return bytes;
      }

      function bytesToHex(bytes) {
        return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      function reverseHex(hex) {
        const bytes = hexToBytes(hex);
        return bytesToHex(bytes.reverse());
      }

      async function computeBitcoinParent(leftHex, rightHex) {
        const combinedHex = `${reverseHex(leftHex)}${reverseHex(rightHex)}`;
        const firstHash = ethers.sha256(`0x${combinedHex}`);
        const secondHash = ethers.sha256(firstHash);
        return reverseHex(secondHash);
      }

      async function generateMerkleProof(txIds, targetTxid) {
        const normalizedTxIds = txIds.map(normalizeTxid);
        const target = normalizeTxid(targetTxid);
        const txIndex = normalizedTxIds.indexOf(target);

        if (txIndex < 0) {
          throw new Error(t("errors.txNotInBlock"));
        }

        let level = normalizedTxIds.slice();
        let currentIndex = txIndex;
        const proof = [];
        const flags = [];

        while (level.length > 1) {
          const isRightNode = currentIndex % 2 === 1;
          let siblingIndex;

          if (isRightNode) {
            siblingIndex = currentIndex - 1;
          } else if (currentIndex === level.length - 1) {
            siblingIndex = currentIndex;
          } else {
            siblingIndex = currentIndex + 1;
          }

          proof.push(`0x${level[siblingIndex]}`);
          flags.push(!isRightNode);

          const nextLevel = [];
          for (let i = 0; i < level.length; i += 2) {
            const left = level[i];
            const right = i + 1 < level.length ? level[i + 1] : level[i];
            nextLevel.push(await computeBitcoinParent(left, right));
          }

          level = nextLevel;
          currentIndex = Math.floor(currentIndex / 2);
        }

        return {
          txIndex,
          proof,
          flags,
          root: `0x${level[0]}`,
          leaf: `0x${target}`,
        };
      }

      async function buildProof(txid) {
        setStatus(t("status.queryingBtc"), "warning");
        const tx = await fetchBtcTransaction(txid);

        if (!tx.hex) {
          throw new Error(t("errors.noRawTx"));
        }

        if (!tx.blockHash) {
          throw new Error(t("errors.txUnconfirmed"));
        }

        if ((tx.confirmations || 0) < MIN_CONFIRMATIONS) {
          throw new Error(
            t("errors.insufficientConfirmations", {
              current: tx.confirmations || 0,
              required: MIN_CONFIRMATIONS,
            })
          );
        }

        setStatus(t("status.generatingProof"), "warning");
        const blockData = await fetchBlockData(tx.blockHash);
        const resolvedBlockHeight = Number(tx.blockHeight || blockData.height || 0);
        if (!resolvedBlockHeight) {
          throw new Error(t("errors.noBlockHeight"));
        }
        const merkle = await generateMerkleProof(blockData.txIds, tx.txid);

        return {
          txRawData: `0x${tx.hex}`,
          blockHeight: resolvedBlockHeight,
          confirmations: Number(tx.confirmations || 0),
          txIndex: merkle.txIndex,
          merkleProof: {
            proof: merkle.proof,
            root: merkle.root,
            leaf: merkle.leaf,
            flags: merkle.flags,
          },
        };
      }

      async function submitProof(event) {
        event.preventDefault();
        setBusy(true);

        try {
          const proofType = getSelectedProofType();
          const { orderAddress, btcTxid, borrowerBtcAddress, timeoutRepayEnabled } = validateInputs();
          const network = getSelectedNetwork();

          if (!state.signer) {
            await connectWallet();
          }

          setStatus(t("status.switchingNetwork"), "warning");
          await ensureSelectedNetwork();

          const providerObject = getWalletProvider();
          state.provider = new ethers.BrowserProvider(providerObject);
          state.signer = await state.provider.getSigner();
          state.account = await state.signer.getAddress();
          state.chainIdHex = await providerObject.request({ method: "eth_chainId" });
          setWalletStatus(
            t("wallet.connected", {
              wallet: escapeHtml(state.walletLabel || t("wallet.defaultName")),
              account: escapeHtml(state.account),
              chainId: escapeHtml(state.chainIdHex),
            }),
            "success"
          );
          setWalletButton();

          if (proofType === "repayment") {
            setStatus(t("status.submittingRepayment"), "warning");
            const orderContract = new ethers.Contract(orderAddress, ORDER_ABI, state.signer);
            const txResponse = await orderContract.confirmRepaymentFromBalance(borrowerBtcAddress);

            setResult(`
              <div class="result-list">
                <div class="result-item">
                  <div class="key">${t("result.borrowerBtc")}</div>
                  <div class="mono">${escapeHtml(borrowerBtcAddress)}</div>
                </div>
              </div>

            setStatus(
              t("status.txSubmitted", { hash: escapeHtml(txResponse.hash) }),
              "warning"

            setStatus(
              t("status.txSuccess", { hash: escapeHtml(txResponse.hash) }),
              "success"
            );

            setResult(`

                <div class="result-item">
                  <div class="key">${t("result.status")}</div>
                  <div>${t("result.submitted")}</div>
                </div>

                  <div class="key">${t("result.type")}</div>
                  <div>${getResultProofTypeLabel(proofType)}</div>
                </div>

                  <div class="key">${t("result.borrowerBtc")}</div>
                  <div class="mono">${escapeHtml(borrowerBtcAddress)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.evmTx")}</div>
                  <div class="mono">${escapeHtml(txResponse.hash)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.order")}</div>
                  <div class="mono">${escapeHtml(shortAddress(orderAddress))}</div>
                </div>
              </div>

          }

          if (proofType === "timeout-repay") {
            setStatus(t("status.submittingTimeoutRepay"), "warning");
            const orderContract = new ethers.Contract(orderAddress, ORDER_ABI, state.signer);
            const txResponse = await orderContract.setTimeoutRepayEnabled(timeoutRepayEnabled);

            setStatus(
              t("status.txSubmitted", { hash: escapeHtml(txResponse.hash) }),
              "warning"
            );

            const receipt = await txResponse.wait();
            if (!receipt || Number(receipt.status) !== 1) {
              throw new Error(t("errors.txFailed"));
            }

            setStatus(
              t("status.txSuccess", { hash: escapeHtml(txResponse.hash) }),
              "success"
            );

            setResult(`
              <div class="result-list">
                <div class="result-item">
                  <div class="key">${t("result.status")}</div>
                  <div>${t("result.submitted")}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.type")}</div>
                  <div>${getResultProofTypeLabel(proofType)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.timeoutRepayEnabled")}</div>
                  <div>${getTimeoutRepayEnabledLabel(timeoutRepayEnabled)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.evmTx")}</div>
                  <div class="mono">${escapeHtml(txResponse.hash)}</div>
                </div>

                  <div class="key">${t("result.order")}</div>

            const txResponse = await orderContract.executeIncreaseRequest();

            }

            setStatus(
              t("status.txSuccess", { hash: escapeHtml(txResponse.hash) }),
              "success"
            );

            setResult(`
              <div class="result-list">
                <div class="result-item">
                  <div class="key">${t("result.status")}</div>
                  <div>${t("result.submitted")}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.type")}</div>
                  <div>${getResultProofTypeLabel(proofType)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.evmTx")}</div>
                  <div class="mono">${escapeHtml(txResponse.hash)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.order")}</div>
                  <div class="mono">${escapeHtml(shortAddress(orderAddress))}</div>
                </div>
              </div>
            `);
            return;
          }

          if (proofType === "cancel-increase") {
            setStatus(t("status.submittingCancelIncrease"), "warning");
            const issuerContract = new ethers.Contract(network.issuer, ISSUER_ABI, state.signer);
            const txResponse = await issuerContract.cancelObsidianIncrease(orderAddress);

            setStatus(
              t("status.txSubmitted", { hash: escapeHtml(txResponse.hash) }),
              "warning"
            );

            const receipt = await txResponse.wait();
            if (!receipt || Number(receipt.status) !== 1) {
              throw new Error(t("errors.txFailed"));
            }

            setStatus(
              t("status.txSuccess", { hash: escapeHtml(txResponse.hash) }),
              "success"
            );

            setResult(`
              <div class="result-list">
                <div class="result-item">
                  <div class="key">${t("result.status")}</div>
                  <div>${t("result.submitted")}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.type")}</div>
                  <div>${getResultProofTypeLabel(proofType)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.evmTx")}</div>
                  <div class="mono">${escapeHtml(txResponse.hash)}</div>
                </div>
                <div class="result-item">
                  <div class="key">${t("result.order")}</div>
                  <div class="mono">${escapeHtml(shortAddress(orderAddress))}</div>
                </div>
              </div>
            `);
            return;
          }

          let proof;
          if (proofType === "renewal") {
            setStatus(t("status.renewalDirect"), "warning");
            proof = buildEmptyRenewalProof();
          } else {
            proof = await buildProof(btcTxid);
          }

          setResult(
            btcTxid
              ? `
            <div class="result-list">
              <div class="result-item">
                <div class="key">${t("result.btcTx")}</div>
                <div class="mono">${escapeHtml(btcTxid)}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.blockHeight")}</div>
                <div>${escapeHtml(proof.blockHeight)}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.confirmations")}</div>
                <div>${escapeHtml(proof.confirmations)}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.proof")}</div>
                <div>${escapeHtml(t("result.proofNodes", { count: proof.merkleProof.proof.length }))}</div>
              </div>
            </div>
          `
              : `
            <div class="result-list">
              <div class="result-item">
                <div class="key">${t("result.btcTx")}</div>
                <div>${t("result.notProvided")}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.proof")}</div>
                <div>${t("result.emptyProof")}</div>
              </div>
            </div>
          `
          );

          let txResponse;
          if (proofType === "pledge") {
            setStatus(t("status.submittingPledge"), "warning");
            const orderContract = new ethers.Contract(orderAddress, ORDER_ABI, state.signer);
            txResponse = await orderContract.submitToLenderTransferProof(
              proof.txRawData,
              proof.blockHeight,
              proof.merkleProof,
              0
            );
          } else if (proofType === "unlock") {
            setStatus(t("status.submittingUnlock"), "warning");
            const issuerContract = new ethers.Contract(network.issuer, ISSUER_ABI, state.signer);
            txResponse = await issuerContract.submitRegularUnlockTransferProof(
              orderAddress,
              proof.txRawData,
              proof.blockHeight,
              proof.merkleProof
            );
          } else {
            setStatus(
              proofType === "renewal" ? t("status.submittingRenewal") : t("status.submittingRenewalTopup"),
              "warning"
            );
            const orderContract = new ethers.Contract(orderAddress, ORDER_ABI, state.signer);
            txResponse = await orderContract.submitRenewalOrderProof(
              proof.txRawData,
              proof.blockHeight,
              proof.merkleProof
            );
          }

          setStatus(
            t("status.txSubmitted", { hash: escapeHtml(txResponse.hash) }),
            "warning"
          );

          const receipt = await txResponse.wait();
          if (!receipt || Number(receipt.status) !== 1) {
            throw new Error(t("errors.txFailed"));
          }

          setStatus(
            t("status.txSuccess", { hash: escapeHtml(txResponse.hash) }),
            "success"
          );

          setResult(`
            <div class="result-list">
              <div class="result-item">
                <div class="key">${t("result.status")}</div>
                <div>${t("result.submitted")}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.type")}</div>
                <div>${getResultProofTypeLabel(proofType)}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.evmTx")}</div>
                <div class="mono">${escapeHtml(txResponse.hash)}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.order")}</div>
                <div class="mono">${escapeHtml(shortAddress(orderAddress))}</div>
              </div>
              <div class="result-item">
                <div class="key">${t("result.btcHeight")}</div>
                <div>${escapeHtml(proof.blockHeight)}</div>
              </div>
            </div>
          `);
        } catch (error) {
          console.error(error);
          const message = extractErrorMessage(error);
          setStatus(t("status.submitFailed", { message: escapeHtml(message) }), "error");
        } finally {
          setBusy(false);
        }
      }

      function attachWalletListeners() {
        const providerObject = getWalletProvider();
        if (!providerObject || typeof providerObject.on !== "function") {
          return;
        }

        providerObject.on("accountsChanged", async (accounts) => {
          if (!accounts || accounts.length === 0) {
            state.provider = null;
            state.signer = null;
            state.account = null;
            state.chainIdHex = null;
            setWalletStatus(t("wallet.disconnected"), "warning");
            setWalletButton();
            return;
          }

          state.account = accounts[0];
          state.chainIdHex = await providerObject.request({ method: "eth_chainId" });
          setWalletStatus(
            t("wallet.connected", {
              wallet: escapeHtml(state.walletLabel || t("wallet.defaultName")),
              account: escapeHtml(state.account),
              chainId: escapeHtml(state.chainIdHex),
            }),
            "success"
          );
          setWalletButton();
        });

        providerObject.on("chainChanged", async (chainId) => {
          state.chainIdHex = chainId;
          if (state.account) {
            setWalletStatus(
              t("wallet.connected", {
                wallet: escapeHtml(state.walletLabel || t("wallet.defaultName")),
                account: escapeHtml(state.account),
                chainId: escapeHtml(chainId),
              }),
              "success"
            );
          }
        });
      }

      async function handleWalletSelect(walletKey) {
        try {
          setBusy(true);
          const selectedWallet = state.discoveredWallets.find((wallet) => wallet.key === walletKey);
          if (selectedWallet) {
            state.walletProvider = selectedWallet.provider;
            state.walletLabel = selectedWallet.info?.name || t("wallet.defaultName");
          }
          closeWalletModal();
          setStatus(t("wallet.connecting"), "warning");
          await connectWallet();
          attachWalletListeners();
          setStatus(t("wallet.connectedShort"), "success");
        } catch (error) {
          console.error(error);
          const message = extractErrorMessage(error, t("errors.unknown"));
          setStatus(t("wallet.connectFailed", { message: escapeHtml(message) }), "error");
        } finally {
          setBusy(false);
        }
      }

      async function handleConnectClick() {
        if (state.account) {
          openWalletModal();
          return;
        }

        if (state.discoveredWallets.length === 0 && window.ethereum) {
          state.walletProvider = window.ethereum;
          state.walletLabel = window.ethereum.isMetaMask
            ? "MetaMask"
            : window.ethereum.isCoinbaseWallet
              ? "Coinbase Wallet"
              : t("wallet.injectedWallet");
          await handleWalletSelect();
          return;
        }

        if (state.discoveredWallets.length <= 1) {
          const singleWallet = state.discoveredWallets[0];
          await handleWalletSelect(singleWallet?.key);
          return;
        }

        openWalletModal();
      }

      function init() {
        renderStaticTexts();
        updateNetworkInfo();
        updateProofTypeHint();
        setupWalletDiscovery();
        setWalletButton();
        setWalletStatus(t("wallet.notConnected"), "warning");
        setStatus(t("status.waitingInput"));
        setResult(t("status.noResult"));

        elements.network.addEventListener("change", () => {
          updateNetworkInfo();
          setStatus(t("status.networkSwitched"));
        });

        elements.proofType.addEventListener("change", updateProofTypeHint);
        elements.languageToggleButton.addEventListener("click", () => {
          setLocale(state.locale === "zh" ? "en" : "zh");
        });
        elements.walletConnectButton.addEventListener("click", handleConnectClick);
        elements.walletModalClose.addEventListener("click", closeWalletModal);
        elements.walletList.addEventListener("click", async (event) => {
          const button = event.target.closest("[data-wallet-key]");
          if (!button) return;
          await handleWalletSelect(button.dataset.walletKey);
        });
        elements.walletModal.addEventListener("click", (event) => {
          if (event.target === elements.walletModal) {
            closeWalletModal();
          }
        });
        elements.form.addEventListener("submit", submitProof);
      }

      init();
    </script>
  </body>
</html>
